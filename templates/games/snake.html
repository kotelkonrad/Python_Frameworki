{% extends 'home.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        /* Styl CSS */
        .grid {
            width: 400px;
            height: 400px;
            display: flex;
            flex-wrap: wrap;
            border: 1px solid #000;
            margin: 20px auto;
        }
        .grid div {
            width: 20px;
            height: 20px;
        }
        .snake {
            background-color: green;
        }
        .apple {
            background-color: red;
            border-radius: 50%;
        }
        .blue-food {
            background-color: blue;
            border-radius: 50%;
        }
        .wall {
            background-color: darkred;
        }
        .collision {
            background-color: darkred !important;
        }
    </style>
</head>
<body>
    <div class="grid">
        <!-- Pole gry zostanie wygenerowane przez JavaScript -->
    </div>
    <p>Wynik: <span id="score">0</span></p>

    <script>
        const grid = document.querySelector('.grid');
        const gridSize = 20;
        let snake = [{ x: 10, y: 10 }];
        let apple = { x: 15, y: 15 };
        let blueFood = null;
        let redWall = null;
        let direction = 'right';
        let nextDirection = 'right';
        let speed = 200;
        let score = 0;
        let gameInterval;
        let blueFoodTimeout;
        let redWallTimeout;
        const scoreDisplay = document.getElementById("score");

        for (let i = 0; i < gridSize * gridSize; i++) {
            const square = document.createElement('div');
            grid.appendChild(square);
        }
        const squares = document.querySelectorAll('.grid div');

        function draw() {
            squares.forEach(square => square.classList.remove('snake', 'apple', 'blue-food', 'wall', 'collision'));
            snake.forEach(segment => squares[segment.y * gridSize + segment.x].classList.add('snake'));
            squares[apple.y * gridSize + apple.x].classList.add('apple');
            if (blueFood) squares[blueFood.y * gridSize + blueFood.x].classList.add('blue-food');
            if (redWall) squares[redWall.y * gridSize + redWall.x].classList.add('wall');
        }

        function move() {
            direction = nextDirection;
            const head = { x: snake[0].x, y: snake[0].y };

            if (direction === 'right') head.x++;
            else if (direction === 'left') head.x--;
            else if (direction === 'up') head.y--;
            else if (direction === 'down') head.y++;

            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                direction = reverseDirection(direction);
                return;
            }

            if (redWall && head.x === redWall.x && head.y === redWall.y) {
                clearInterval(gameInterval);
                alert('Koniec gry! Uderzyłeś w czerwoną ścianę.');
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                clearInterval(gameInterval);
                alert('Koniec gry! Uderzyłeś w siebie.');
                return;
            }

            snake.unshift(head);

            if (head.x === apple.x && head.y === apple.y) {
                apple = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
                score++;
            } else if (blueFood && head.x === blueFood.x && head.y === blueFood.y) {
                score = Math.max(0, score - 1);
                snake.pop();
                blueFood = null;
            } else {
                snake.pop();
            }

            scoreDisplay.textContent = score;
            draw();
        }

        function reverseDirection(dir) {
            if (dir === 'right') return 'left';
            if (dir === 'left') return 'right';
            if (dir === 'up') return 'down';
            if (dir === 'down') return 'up';
        }

        function spawnBlueFood() {
            blueFood = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
            setTimeout(() => blueFood = null, 10000);
        }

        function spawnRedWall() {
            redWall = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
            setTimeout(() => redWall = null, 10000);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' && direction !== 'down') nextDirection = 'up';
            else if (e.key === 'ArrowDown' && direction !== 'up') nextDirection = 'down';
            else if (e.key === 'ArrowLeft' && direction !== 'right') nextDirection = 'left';
            else if (e.key === 'ArrowRight' && direction !== 'left') nextDirection = 'right';
        });

        draw();
        gameInterval = setInterval(move, speed);
        setInterval(spawnBlueFood, Math.random() * (18000 - 13000) + 13000);
        setInterval(spawnRedWall, Math.random() * (13000 - 1000) + 1000);
    </script>
</body>
</html>
{% endblock %}
