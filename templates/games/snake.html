{% extends 'home.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        canvas {
            border: 1px solid #000;
            margin: 20px auto;
            display: block;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="400" height="400" class="rounded-xl shadow-2xl"></canvas>
<div class="flex flex-col items-center font-bold text-2xl mt-4">
    <p>Snake</p>
    <p>Wynik: <span id="score" class="font-semibold">0</span></p>
</div>
<div class="flex justify-center mt-4">
    <button id="up-btn" class="bg-blue-500 text-white px-4 py-2 m-1 rounded">Góra</button>
</div>
<div class="flex justify-center">
    <button id="left-btn" class="bg-blue-500 text-white px-4 py-2 m-1 rounded">Lewo</button>
    <button id="down-btn" class="bg-blue-500 text-white px-4 py-2 m-1 rounded">Dół</button>
    <button id="right-btn" class="bg-blue-500 text-white px-4 py-2 m-1 rounded">Prawo</button>
</div>
<div class="flex justify-center mt-4">
    <button id="start-btn" class="bg-green-500 text-white px-4 py-2 m-1 rounded">Start</button>
    <button id="pause-btn" class="bg-yellow-500 text-white px-4 py-2 m-1 rounded">Pauza</button>
    <button id="reset-btn" class="bg-red-500 text-white px-4 py-2 m-1 rounded">Reset</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 20;
    const tileSize = 20;
    let snake = [{x: 10, y: 10}];
    let apple = [{x: 15, y: 15}];
    let blueFood = null;
    let redWall = null;
    let direction = 'right';
    let nextDirection = 'right';
    let speed = 200;
    let score = 0;
    let gameOver = false;
    let gameInterval;
    const scoreDisplay = document.getElementById("score");

    function draw() {
        if (gameOver) {
            displayGameOver();
            return;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'green';
        snake.forEach(segment => ctx.fillRect(segment.x * tileSize, segment.y * tileSize, tileSize - 1, tileSize - 1));
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(apple.x * tileSize + tileSize / 2, apple.y * tileSize + tileSize / 2, tileSize / 2 - 1, 0, Math.PI * 2);
        ctx.fill();
        if (blueFood) {
            ctx.fillStyle = 'blue';
            ctx.beginPath();
            ctx.arc(blueFood.x * tileSize + tileSize / 2, blueFood.y * tileSize / 2, tileSize / 2 - 1, 0, Math.PI * 2);
            ctx.fill();
        }
        if (redWall) {
            ctx.fillStyle = 'darkred';
            if (redWall.side === 'top') ctx.fillRect(0, 0, canvas.width, 2);
            if (redWall.side === 'bottom') ctx.fillRect(0, canvas.height - 2, canvas.width, 2);
            if (redWall.side === 'left') ctx.fillRect(0, 0, 2, canvas.height);
            if (redWall.side === 'right') ctx.fillRect(canvas.width - 2, 0, 2, canvas.height);
        }
    }

    function displayGameOver() {
        ctx.fillStyle = 'red';
        ctx.font = '30px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Koniec gry!', canvas.width / 2, canvas.height / 2);
    }

    function move() {
        if (gameOver) return;

        direction = nextDirection;
        const head = {x: snake[0].x, y: snake[0].y};

        if (direction === 'right') head.x++;
        else if (direction === 'left') head.x--;
        else if (direction === 'up') head.y--;
        else if (direction === 'down') head.y++;

        if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
            direction = reverseDirection(direction);
            nextDirection = direction;
            return;
        }

        if (redWall) {
            if ((redWall.side === 'top' && head.y === 0) ||
                (redWall.side === 'bottom' && head.y === gridSize - 1) ||
                (redWall.side === 'left' && head.x === 0) ||
                (redWall.side === 'right' && head.x === gridSize - 1)) {
                gameOver = true;
                displayGameOver();
                clearInterval(gameInterval);
                return;
            }
        }

        let ateApple = false;

        if (head.x === apple.x && head.y === apple.y) {
            apple = {x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize)};
            score++;
            ateApple = true;
        } else if (blueFood && head.x === blueFood.x && head.y === blueFood.y) {
            if (score === 0) {
                gameOver = true;
                displayGameOver();
                clearInterval(gameInterval);
                return;
            } else {
                score--;
                snake.pop(); // Usunięcie segmentu węża
                blueFood = null; // Usunięcie niebieskiego kółka
            }
        }

        snake.unshift(head);
        if (!ateApple) {
            snake.pop();
        }

        scoreDisplay.textContent = score;
        draw();
    }

    function reverseDirection(dir) {
        if (dir === 'right') return 'left';
        if (dir === 'left') return 'right';
        if (dir === 'up') return 'down';
        if (dir === 'down') return 'up';
    }

    function spawnBlueFood() {
        if (gameOver) return;
        blueFood = {x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize)};
        setTimeout(() => blueFood = null, 10000);
    }

    function spawnRedWall() {
        if (gameOver) return;
        const sides = ['top', 'bottom', 'left', 'right'];
        redWall = {side: sides[Math.floor(Math.random() * sides.length)]};
        setTimeout(() => redWall = null, 10000);
    }

    function startGame() {
        if (gameInterval) clearInterval(gameInterval);
        gameOver = false;
        snake = [{x: 10, y: 10}];
        apple = {x: 15, y: 15};
        direction = 'right';
        nextDirection = 'right';
        score = 0;
        scoreDisplay.textContent = score;
        gameInterval = setInterval(move, speed);
    }

    function pauseGame() {
        if (gameInterval) {
            clearInterval(gameInterval);
            gameInterval = null;
        } else {
            gameInterval = setInterval(move, speed);
        }
    }

    function resetGame() {
        clearInterval(gameInterval);
        gameOver = false;
        snake = [{x: 10, y: 10}];
        apple = {x: 15, y: 15};
        direction = 'right';
        nextDirection = 'right';
        score = 0;
        scoreDisplay.textContent = score;
        draw();
    }

    document.addEventListener('keydown', (e) => {
        if (gameOver) return;
        if (score === 0 || snake.length === 1) {
            if (e.key === 'ArrowUp') nextDirection = 'up';
            else if (e.key === 'ArrowDown') nextDirection = 'down';
            else if (e.key === 'ArrowLeft') nextDirection = 'left';
            else if (e.key === 'ArrowRight') nextDirection = 'right';
        } else {
            if (e.key === 'ArrowUp' && direction !== 'down') nextDirection = 'up';
            else if (e.key === 'ArrowDown' && direction !== 'up') nextDirection = 'down';
            else if (e.key === 'ArrowLeft' && direction !== 'right') nextDirection = 'left';
            else if (e.key === 'ArrowRight' && direction !== 'left') nextDirection = 'right';
        }
    });

    document.getElementById('up-btn').addEventListener('click', () => {
        if (score === 0 || snake.length === 1 || direction !== 'down') nextDirection = 'up';
    });

    document.getElementById('down-btn').addEventListener('click', () => {
        if (score === 0 || snake.length === 1 || direction !== 'up') nextDirection = 'down';
    });

    document.getElementById('left-btn').addEventListener('click', () => {
        if (score === 0 || snake.length === 1 || direction !== 'right') nextDirection = 'left';
    });

    document.getElementById('right-btn').addEventListener('click', () => {
        if (score === 0 || snake.length === 1 || direction !== 'left') nextDirection = 'right';
    });

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('pause-btn').addEventListener('click', pauseGame);
    document.getElementById('reset-btn').addEventListener('click', resetGame);

    draw();
</script>
</body>
</html>
{% endblock %}
