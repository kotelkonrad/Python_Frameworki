{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Gry{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/main.build.css' %}">
</head>
<body class="font-sans bg-white text-gray-900 min-h-screen flex flex-col">

<header class="bg-red-600 text-white flex flex-col md:flex-row items-center justify-between p-4">
    <div class="flex items-center mb-4 md:mb-0">
        <nav class="flex flex-col md:flex-row">
            <a href="{% url 'home' %}">
                <img src="{% static 'images/logo.png' %}" alt="Logo"
                     class="h-10 w-10 mr-4 rounded-full border-4 border-yellow-500">
            </a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Nowe</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Logiczne</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Akcje</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Multiplayer</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Dziewczyny</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Symulatory</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Zręcznościowe</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Sport</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">MMO</a>
            <a href="#" class="hover:bg-red-500 px-3 py-1 rounded transition">Dla Ciebie</a>
        </nav>
    </div>
    <div>
        <form action="{% url 'search' %}" method="get">
            <input type="text" name="q" aria-label="Wyszukiwanie w witrynie" placeholder="Szukaj..."
                   class="px-3 py-1 rounded text-gray-800">
            <button type="submit" class="px-3 py-1 bg-red-600 text-white rounded">Szukaj</button>
        </form>
    </div>
</header>

<main class="flex-grow">
    {% block content %}
    {% endblock %}
</main>

<footer class="bg-red-800 text-white py-4">
    <div class="container mx-auto text-center">
        <p>&copy; 2025 Gry. Wszelkie prawa zastrzeżone.</p>
        <nav class="flex justify-center space-x-4 mt-2">
            <a href="/polityka-prywatnosci" class="hover:underline">Polityka Prywatności</a>
            <a href="/regulamin" class="hover:underline">Regulamin</a>
            <a href="/kontakt" class="hover:underline">Kontakt</a>
        </nav>
    </div>
</footer>

</body>
</html>
